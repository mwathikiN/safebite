<div class="profile-card-container">

  <!-- Header -->
  <div class="profile-header">
    <h2>🍽️ Your Food Profile</h2>
    <p>Help SafeBite understand your preferences</p>
  </div>

  <!-- Input Fields -->
  <div class="profile-body">

    <div class="form-group">
      <label><span class="icon">⚠️</span> Allergies</label>
      <input type="text" id="allergiesInput" placeholder="e.g. peanuts, dairy, eggs">
    </div>

    <div class="form-group">
      <label><span class="icon">🚫</span> Foods To Avoid</label>
      <input type="text" id="avoidFoodsInput" placeholder="e.g. sugar, fried foods">
    </div>

    <div class="form-group">
      <label><span class="icon">🥗</span> Preferred Diet</label>
      <input type="text" id="dietInput" placeholder="e.g. vegan, low-carb">
    </div>

    <div class="form-group">
      <label><span class="icon">🎯</span> Health Goals</label>
      <input type="text" id="goalsInput" placeholder="e.g. weight loss, sugar control">
    </div>

    <button id="saveProfileBtn" class="save-btn">Save Profile</button>

  </div>

</div>
